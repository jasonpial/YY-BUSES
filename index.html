<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO & Accessibility -->
  <title>YY Buses Uganda - Integrated Fleet & Courier Management System</title>
  <meta name="description" content="A comprehensive digital ticketing, GPS route progress, operational expense tracking, and parcel courier delivery management system for YY Buses Uganda.">
  <meta name="theme-color" content="#1a365d">
  
  <!-- Pre-connect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  
  <!-- Global Application Shell Container -->
  <div id="app">
    <!-- Main Shell elements are injected reactively via src/main.js -->
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; gap: 10px; color: #1a365d;">
      <div style="font-size: 1.5rem; font-weight: bold; animation: pulse 1.5s infinite;">🚌 Loading YY Buses Portal...</div>
      <p style="color: #64748b; font-size: 0.9rem;">Connecting to terminal services and local database...</p>
    </div>
  </div>

  <!-- Entry JavaScript Module -->
  <script type="module" src="./src/main.js"></script>

  <style>
    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.6; transform: scale(0.98); }
    }
  </style>
</body>
</html>
